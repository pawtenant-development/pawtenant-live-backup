    <!-- ═══════════════════════════════════════════════════════════════════
         Tracking bootstrap (Phase 8 — interaction-trigger load, 2026-05-27).

         What ships immediately (always, before LCP):
           • window.dataLayer queue
           • gtag() function pushed to dataLayer (queue stub)
           • window.fbq queue stub
           • gtag('config', ...) calls so any analytics IDs are queued
             before the external scripts arrive.
           • fbq('init', ...) so the Pixel init call is queued early.

         External scripts (gtag.js + fbevents.js) load on the earliest of:
           1. Hard-load lands on a conversion-critical route → load now.
           2. SPA navigates into a conversion-critical route → App.tsx
              calls window.__ptLoadMarketing() and they load now.
           3. First meaningful user interaction (pointerdown / touchstart
              / keydown / scroll) → load now.
           4. window.load + 8000 ms + requestIdleCallback fallback so
              they still load eventually even if the user never interacts
              (preserves background page_view + Meta retargeting).

         Why this is safe for Meta CAPI dedup + GA conversion tracking:
           Both gtag() and fbq() are designed to accept calls before the
           remote script is loaded — the queued calls flush in order once
           the script attaches. Conversion event timestamps, eventID
           dedup keys (e.g. `purchase_<confirmationId>` matched against
           server-side CAPI in send-meta-capi-event), and Google
           Enhanced Conversions `gtag('set', 'user_data', ...)` all
           continue to work because the queued events replay against
           the loaded SDK in the same order.

         Diagnostic override:
           %VITE_DIAG_DISABLE_MARKETING_TAGS% is substituted at build
           time by Vite. When set to "true" on TEST, the external
           gtag.js and fbevents.js scripts are NOT loaded under ANY
           trigger — used purely to isolate TBT impact in PageSpeed
           runs. The queue stubs above remain in place so attribution
           code, gtag()/fbq() callers, and CAPI dedup keys never NPE.
           When the env var is unset (production default), the literal
           "%VITE_DIAG_DISABLE_MARKETING_TAGS%" stays in the
           comparison and evaluates false, so external scripts load
           per the trigger logic below.
         ═══════════════════════════════════════════════════════════════════ -->
    <script>
      (function () {
        // ── Queue stubs — available synchronously so React effects that
        //     call gtag() or fbq() never NPE before the scripts arrive. ──
        window.dataLayer = window.dataLayer || [];
        window.gtag = window.gtag || function () { window.dataLayer.push(arguments); };
        window.gtag('js', new Date());
        window.gtag('config', 'G-BYFK1LCQHL');
        window.gtag('config', 'AW-11509262282');
        window.gtag('config', 'GT-P3HVCLCL');
        window.gtag('config', 'GT-55KSTVFH');

        if (!window.fbq) {
          var n = window.fbq = function () {
            n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
          };
          if (!window._fbq) window._fbq = n;
          n.push = n;
          n.loaded = !0;
          n.version = '2.0';
          n.queue = [];
        }
        window.fbq('init', '2970753196590228');

        var DIAG_DISABLE_MARKETING_TAGS = '%VITE_DIAG_DISABLE_MARKETING_TAGS%' === 'true';

        // ── Single idempotent loader for both gtag.js and fbevents.js ─
        var loaded = false;
        function loadAll() {
          if (loaded) return;
          if (DIAG_DISABLE_MARKETING_TAGS) return;
          loaded = true;
          // gtag.js
          var g = document.createElement('script');
          g.async = true;
          g.src = 'https://www.googletagmanager.com/gtag/js?id=GT-P3HVCLCL';
          document.head.appendChild(g);
          // fbevents.js
          var f = document.createElement('script');
          f.async = true;
          f.src = 'https://connect.facebook.net/en_US/fbevents.js';
          var first = document.getElementsByTagName('script')[0];
          first.parentNode.insertBefore(f, first);
        }
        // Expose for SPA-driven force-load: App.tsx calls this on
        // route changes into conversion-critical routes so the heavy
        // scripts attach before the Purchase / InitiateCheckout
        // Pixel + gtag conversion events flush.
        window.__ptLoadMarketing = loadAll;

        // ── Conversion-critical route detection (hard-load bypass) ────
        //     Thank-you, PSD thank-you, and checkout flows must fire
        //     conversion events the moment they paint. Hard refresh on
        //     these pages loads scripts immediately, before any
        //     delay/interaction trigger logic runs.
        var path = (window.location && window.location.pathname) || '';
        var CONVERSION_PATHS = [
          '/assessment/thank-you',
          '/psd-assessment/thank-you',
          '/account/checkout',
        ];
        for (var i = 0; i < CONVERSION_PATHS.length; i++) {
          if (path.indexOf(CONVERSION_PATHS[i]) === 0) {
            loadAll();
            return;
          }
        }

        // ── Interaction trigger ───────────────────────────────────────
        //     First meaningful USER interaction loads the scripts. A
        //     CTA click on the homepage naturally triggers this well
        //     before the user reaches assessment Step 3, so
        //     InitiateCheckout / Purchase still fire with fbq + gtag
        //     loaded.
        //
        //     We deliberately exclude `scroll` from the trigger list
        //     because layout settle / image decode / reflow can fire
        //     a programmatic scroll within the LCP window — a real
        //     user scroll is preceded by pointerdown/touchstart
        //     anyway, so the user trigger still fires immediately on
        //     the very first finger-down or mouse-down.
        //
        //     isTrusted filter: rejects synthetic events dispatched
        //     by React/test code so layout work does not trip the
        //     loader before the user actually interacts.
        var INTERACTION_EVENTS = ['pointerdown', 'touchstart', 'keydown'];
        var listenerOpts = { passive: true, capture: true };
        function onInteraction(e) {
          if (e && e.isTrusted === false) return;
          loadAll();
        }
        for (var j = 0; j < INTERACTION_EVENTS.length; j++) {
          try {
            window.addEventListener(INTERACTION_EVENTS[j], onInteraction, listenerOpts);
          } catch (e) {
            // Old browsers may reject the options object — fall back
            // to a boolean capture flag.
            try { window.addEventListener(INTERACTION_EVENTS[j], onInteraction, true); } catch (e2) {}
          }
        }

        // ── Idle fallback: window.load + 8s + requestIdleCallback ─────
        //     If the user never interacts (rare on a marketing page),
        //     scripts still attach so background page_view + Meta
        //     retargeting + GA session work as before — just well
        //     past the LCP/TBT window PageSpeed measures.
        var BASE_DELAY_MS = 8000;
        function scheduleIdleLoad() {
          window.setTimeout(function () {
            if (loaded) return;
            if (typeof window.requestIdleCallback === 'function') {
              window.requestIdleCallback(loadAll, { timeout: 4000 });
            } else {
              window.setTimeout(loadAll, 500);
            }
          }, BASE_DELAY_MS);
        }
        if (document.readyState === 'complete') {
          scheduleIdleLoad();
        } else {
          window.addEventListener('load', scheduleIdleLoad, { once: true });
        }
      })();
    </script>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- Visitor Geo Bootstrap — runs strictly AFTER window.load event.     -->
    <!-- Populates sessionStorage.pt_geo so chat capture can attach         -->
    <!-- location on subsequent visitor messages.                           -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <script type="text/javascript">
      (function() {
        function runGeoFetch() {
          try {
            var KEY = 'pt_geo';
            var existing = sessionStorage.getItem(KEY);
            if (existing) {
              try {
                var parsed = JSON.parse(existing);
                if (parsed && (parsed.country_code || parsed.country)) return;
              } catch (e) {}
            }
            fetch('https://ipwho.is/?fields=success,country,country_code,region,region_code,city,latitude,longitude,timezone,ip', { method: 'GET' })
              .then(function(r) { return r && r.ok ? r.json() : null; })
              .then(function(d) {
                if (!d || d.success === false) return;
                var geo = {
                  country: d.country || null,
                  country_code: d.country_code || null,
                  region: d.region || null,
                  region_code: d.region_code || null,
                  city: d.city || null,
                  latitude: typeof d.latitude === 'number' ? d.latitude : null,
                  longitude: typeof d.longitude === 'number' ? d.longitude : null,
                  timezone: (d.timezone && d.timezone.id) || null,
                  ip: d.ip || null,
                  source: 'ipwho.is',
                  fetched_at: new Date().toISOString()
                };
                try { sessionStorage.setItem(KEY, JSON.stringify(geo)); } catch (e) {}
              })
              .catch(function() { /* silent */ });
          } catch (e) { /* silent */ }
        }

        if (document.readyState === 'complete') {
          setTimeout(runGeoFetch, 0);
        } else {
          window.addEventListener('load', function() { setTimeout(runGeoFetch, 0); });
        }
      })();
    </script>
