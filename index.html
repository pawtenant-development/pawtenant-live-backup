    <!-- ═══════════════════════════════════════════════════════════════════
         Tracking bootstrap (idle-load).

         What ships immediately:
           • window.dataLayer queue
           • gtag() function pushed to dataLayer (queue stub)
           • window.fbq queue stub
           • gtag('config', ...) calls so any analytics IDs are queued
             before the external scripts arrive.

         What is deferred to requestIdleCallback (timeout 3500ms):
           • https://www.googletagmanager.com/gtag/js?id=...
           • https://connect.facebook.net/en_US/fbevents.js
           • fbq('init') runs the moment fbevents.js is attached so the
             standard pixel-init path is preserved.

         Why this is safe for Meta CAPI dedup + GA conversion tracking:
           Both gtag() and fbq() are designed to accept calls before the
           remote script is loaded — the queued calls flush in order once
           the script attaches. Conversion event timestamps, eventID
           dedup keys, and CAPI parity all continue to work because the
           queued events still carry their original timestamps when they
           replay against the loaded SDK.

         Conversion-critical pages bypass the idle delay so the GA / Meta
         conversion event fires the moment the thank-you / checkout
         page loads. Bypass triggers on first paint, not React mount,
         so a hard refresh on those pages still tracks immediately.
         ═══════════════════════════════════════════════════════════════════ -->
    <script>
      (function () {
        // ── Queue stubs — available synchronously so React effects that
        //     call gtag() or fbq() never NPE before the scripts arrive. ──
        window.dataLayer = window.dataLayer || [];
        window.gtag = window.gtag || function () { window.dataLayer.push(arguments); };
        window.gtag('js', new Date());
        window.gtag('config', 'G-BYFK1LCQHL');
        window.gtag('config', 'AW-11509262282');
        window.gtag('config', 'GT-P3HVCLCL');
        window.gtag('config', 'GT-55KSTVFH');

        if (!window.fbq) {
          var n = window.fbq = function () {
            n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
          };
          if (!window._fbq) window._fbq = n;
          n.push = n;
          n.loaded = !0;
          n.version = '2.0';
          n.queue = [];
        }
        window.fbq('init', '2970753196590228');

        // ── External script loaders ───────────────────────────────────
        var gtagLoaded = false;
        var fbLoaded = false;
        function loadGtag() {
          if (gtagLoaded) return;
          gtagLoaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=GT-P3HVCLCL';
          document.head.appendChild(s);
        }
        function loadFbq() {
          if (fbLoaded) return;
          fbLoaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://connect.facebook.net/en_US/fbevents.js';
          var first = document.getElementsByTagName('script')[0];
          first.parentNode.insertBefore(s, first);
        }
        function loadAll() { loadGtag(); loadFbq(); }

        // ── Conversion-critical route detection ───────────────────────
        //     Thank-you, PSD thank-you, and checkout flows must fire
        //     conversion events the moment they paint. Hard refresh on
        //     these pages bypasses the idle delay.
        var path = (window.location && window.location.pathname) || '';
        var CONVERSION_PATHS = [
          '/assessment/thank-you',
          '/psd-assessment/thank-you',
          '/account/checkout',
        ];
        var isConversionRoute = false;
        for (var i = 0; i < CONVERSION_PATHS.length; i++) {
          if (path.indexOf(CONVERSION_PATHS[i]) === 0) {
            isConversionRoute = true;
            break;
          }
        }

        if (isConversionRoute) {
          // Load immediately — conversion timestamp must land at paint.
          loadAll();
        } else if (typeof window.requestIdleCallback === 'function') {
          // Idle with 3500 ms timeout — covers slow networks where idle
          // never reports without a deadline.
          window.requestIdleCallback(loadAll, { timeout: 3500 });
        } else {
          // Safari / older — schedule after page is interactive.
          if (document.readyState === 'complete') {
            setTimeout(loadAll, 1500);
          } else {
            window.addEventListener('load', function () { setTimeout(loadAll, 1500); }, { once: true });
          }
        }
      })();
    </script>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- Visitor Geo Bootstrap — runs strictly AFTER window.load event.     -->
    <!-- Populates sessionStorage.pt_geo so chat capture can attach         -->
    <!-- location on subsequent visitor messages.                           -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <script type="text/javascript">
      (function() {
        function runGeoFetch() {
          try {
            var KEY = 'pt_geo';
            var existing = sessionStorage.getItem(KEY);
            if (existing) {
              try {
                var parsed = JSON.parse(existing);
                if (parsed && (parsed.country_code || parsed.country)) return;
              } catch (e) {}
            }
            fetch('https://ipwho.is/?fields=success,country,country_code,region,region_code,city,latitude,longitude,timezone,ip', { method: 'GET' })
              .then(function(r) { return r && r.ok ? r.json() : null; })
              .then(function(d) {
                if (!d || d.success === false) return;
                var geo = {
                  country: d.country || null,
                  country_code: d.country_code || null,
                  region: d.region || null,
                  region_code: d.region_code || null,
                  city: d.city || null,
                  latitude: typeof d.latitude === 'number' ? d.latitude : null,
                  longitude: typeof d.longitude === 'number' ? d.longitude : null,
                  timezone: (d.timezone && d.timezone.id) || null,
                  ip: d.ip || null,
                  source: 'ipwho.is',
                  fetched_at: new Date().toISOString()
                };
                try { sessionStorage.setItem(KEY, JSON.stringify(geo)); } catch (e) {}
              })
              .catch(function() { /* silent */ });
          } catch (e) { /* silent */ }
        }

        if (document.readyState === 'complete') {
          setTimeout(runGeoFetch, 0);
        } else {
          window.addEventListener('load', function() { setTimeout(runGeoFetch, 0); });
        }
      })();
    </script>
