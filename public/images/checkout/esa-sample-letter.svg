<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1035" width="800" height="1035" role="img" aria-label="Sample ESA Letter">
  <defs>
    <linearGradient id="paperShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f8fa"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Page -->
  <rect x="20" y="20" width="760" height="995" rx="10" ry="10" fill="url(#paperShadow)" stroke="#e3e6ec" stroke-width="1" filter="url(#softShadow)"/>

  <!-- Top accent bar (PawTenant orange) -->
  <rect x="20" y="20" width="760" height="6" rx="3" ry="3" fill="#F26A21"/>

  <!-- Header: Doctor (left) -->
  <g font-family="Helvetica, Arial, sans-serif">
    <text x="56" y="78" font-size="19" font-weight="700" fill="#0f172a">Dr. Amelia Hart, PhD, LPC-S</text>
    <text x="56" y="100" font-size="12" fill="#475569">Licensed Professional Counselor, Licensed Therapist</text>
    <text x="56" y="118" font-size="12" fill="#475569">Behavioral Health and Housing Accommodation</text>
    <text x="56" y="136" font-size="12" fill="#475569">Specialist</text>
  </g>

  <!-- Verification ID box (top-right) -->
  <g>
    <rect x="484" y="48" width="280" height="100" rx="6" ry="6" fill="#FFF7ED" stroke="#F26A21" stroke-width="1.5"/>
    <text x="752" y="68" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#64748b">Verification ID:</text>
    <text x="752" y="94" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#F26A21" letter-spacing="0.5">ESA-CA-XXXXXX</text>
    <text x="752" y="116" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">pawtenant.com/verify/ESA-CA-XXXXXX</text>
    <text x="752" y="134" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" font-style="italic">Reserved injector-safe area</text>
  </g>

  <!-- Divider -->
  <line x1="56" y1="162" x2="744" y2="162" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Letter meta block -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1f2937">
    <text x="56" y="188">Dr. Amelia Hart</text>
    <text x="56" y="206">License #LPC-204817-CA</text>
    <text x="56" y="224">April 10, 2026</text>
    <text x="56" y="242">To Whom It May Concern:</text>
  </g>

  <!-- Body paragraphs -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1f2937">
    <!-- Paragraph 1 -->
    <text x="56" y="276">
      <tspan x="56" dy="0">I am a licensed therapist currently providing behavioral health services to Jordan Bennett, born March 18,</tspan>
      <tspan x="56" dy="17">1994. I have evaluated Jordan and determined that they have a mental health condition that substantially</tspan>
      <tspan x="56" dy="17">limits one or more major life activities within the meaning of applicable fair housing guidance.</tspan>
    </text>

    <!-- Paragraph 2 -->
    <text x="56" y="352">
      <tspan x="56" dy="0">Based on my clinical evaluation and ongoing therapeutic relationship, I have determined that Jordan benefits</tspan>
      <tspan x="56" dy="17">from the presence of an Emotional Support Animal named Luna, a domestic short-hair cat. The animal</tspan>
      <tspan x="56" dy="17">provides emotional stabilization, reduces symptoms associated with the condition, and supports daily</tspan>
      <tspan x="56" dy="17">functioning in the home environment.</tspan>
    </text>

    <!-- Paragraph 3 -->
    <text x="56" y="445">
      <tspan x="56" dy="0">In my professional opinion, the Emotional Support Animal is a necessary part of Jordan's treatment plan and</tspan>
      <tspan x="56" dy="17">helps alleviate disability-related symptoms. Because of that therapeutic benefit, reasonable accommodation</tspan>
      <tspan x="56" dy="17">for the animal in housing is clinically appropriate.</tspan>
    </text>

    <!-- Paragraph 4 -->
    <text x="56" y="521">
      <tspan x="56" dy="0">This letter is provided for housing-related accommodation purposes. To protect patient confidentiality,</tspan>
      <tspan x="56" dy="17">detailed diagnostic information is not included here. Verification of my professional credentials may be</tspan>
      <tspan x="56" dy="17">provided as permitted by law.</tspan>
    </text>
  </g>

  <!-- Patient info table -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="12">
    <!-- label column background -->
    <rect x="56" y="590" width="220" height="120" fill="#f1f5f9"/>
    <!-- outer border -->
    <rect x="56" y="590" width="688" height="120" fill="none" stroke="#cbd5e1" stroke-width="1"/>
    <!-- column divider -->
    <line x1="276" y1="590" x2="276" y2="710" stroke="#cbd5e1"/>
    <!-- row dividers -->
    <line x1="56" y1="620" x2="744" y2="620" stroke="#cbd5e1"/>
    <line x1="56" y1="650" x2="744" y2="650" stroke="#cbd5e1"/>
    <line x1="56" y1="680" x2="744" y2="680" stroke="#cbd5e1"/>

    <!-- Labels -->
    <g font-weight="700" fill="#0f172a">
      <text x="70" y="610">Patient Name</text>
      <text x="70" y="640">Date of Birth</text>
      <text x="70" y="670">Support Animal</text>
      <text x="70" y="700">Letter Purpose</text>
    </g>
    <!-- Values -->
    <g fill="#1f2937">
      <text x="290" y="610">Jordan Bennett</text>
      <text x="290" y="640">March 18, 1994</text>
      <text x="290" y="670">Luna - Domestic Short-Hair Cat</text>
      <text x="290" y="700">Sample template demonstrating injector-safe layout</text>
    </g>
  </g>

  <!-- Sincerely -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1f2937">
    <text x="56" y="748">Sincerely,</text>
  </g>

  <!-- Signature script -->
  <text x="56" y="798" font-family="'Brush Script MT', 'Segoe Script', cursive" font-size="34" font-style="italic" fill="#0f172a">Amelia Hart, PhD, LPC-S</text>

  <!-- Signature details -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155">
    <text x="56" y="826" fill="#0f172a">Dr. Amelia Hart</text>
    <text x="56" y="844">Licensed Professional Counselor - California</text>
    <text x="56" y="862">License #LPC-204817-CA</text>
    <text x="56" y="884">Phone: (555) 310-2048  |  Email: amelia.hart@exampleclinic.com</text>
    <text x="56" y="902">Office: 2450 Harbor Avenue, Suite 210, San Diego, CA 92101</text>
  </g>

  <!-- Footer note -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" font-style="italic">
    <line x1="56" y1="950" x2="744" y2="950" stroke="#e2e8f0"/>
    <text x="56" y="972">Template note: top-right verification box is intentionally reserved as the injected verification ID area.</text>
    <text x="744" y="972" text-anchor="end" font-style="normal" fill="#64748b">Page 1 of 1</text>
  </g>
</svg>
